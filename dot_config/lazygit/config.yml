gui:
  nerdFontsVersion: "3"
  showFileIcons: true
  showListFooter: true
  showRandomTip: false
  showCommandLog: false
  showBottomLine: true
  sidePanelWidth: 0.25
  language: en
git:
  autoFetch: true
  autoRefresh: true
  parseEmoji: true
  autoForwardBranches: onlyMainBranches
  fetchAll: true
  pagers:
    - colorArg: always
      pager: delta --dark --paging=never
  commit:
    signOff: false
    autoWrapCommitMessage: true
    autoWrapWidth: 72
  log:
    order: topo-order
    showGraph: always
    showWholeGraph: false
  mainBranches:
    - master
    - main
os:
  editPreset: nvim
keybinding:
  universal:
    quit: q
    quit-alt1: <c-c>
    return: <esc>
customCommands:
  - key: "<c-g>"
    context: "files"
    description: "Commit with Codex"
    prompts:
      - type: "input"
        title: "Commit message"
        key: "Message"
        initialValue: '{{ runCommand "lazygit-codex-commit-message" }}'
    command: 'git commit -m {{ .Form.Message | quote }}'
    output: log
