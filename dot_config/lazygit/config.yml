gui:
  nerdFontsVersion: "3"
  showFileIcons: true
  showListFooter: true
  showRandomTip: false
  showCommandLog: false
  showBottomLine: true
  sidePanelWidth: 0.25
  language: en
  theme:
    activeBorderColor:
      - '#89b4fa'
      - bold
    inactiveBorderColor:
      - '#a6adc8'
    searchingActiveBorderColor:
      - '#f9e2af'
    optionsTextColor:
      - '#89b4fa'
    selectedLineBgColor:
      - '#313244'
    inactiveViewSelectedLineBgColor:
      - '#6c7086'
    cherryPickedCommitFgColor:
      - '#89b4fa'
    cherryPickedCommitBgColor:
      - '#45475a'
    markedBaseCommitFgColor:
      - '#89b4fa'
    markedBaseCommitBgColor:
      - '#f9e2af'
    unstagedChangesColor:
      - '#f38ba8'
    defaultFgColor:
      - '#cdd6f4'
  authorColors:
    '*': '#b4befe'
git:
  autoFetch: true
  autoRefresh: true
  parseEmoji: true
  autoForwardBranches: onlyMainBranches
  fetchAll: true
  pagers:
    - colorArg: always
      pager: delta --dark --paging=never
  commit:
    signOff: false
    autoWrapCommitMessage: true
    autoWrapWidth: 72
  log:
    order: topo-order
    showGraph: always
    showWholeGraph: false
  mainBranches:
    - master
    - main
os:
  editPreset: nvim
keybinding:
  universal:
    quit: q
    quit-alt1: <c-c>
    return: <esc>
